name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest
          - target: ios
            os: macos-latest
          - target: linux
            os: ubuntu-latest
          - target: macos
            os: macos-latest
          - target: windows
            os: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache rustup toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
            ~/.cargo/bin
          key: rustup-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rustup-${{ runner.os }}-

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"
          cache-targets: true
          cache-on-failure: true

      - name: Install Linux Dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++6 libmpv-dev mpv

      - name: Install Flutter Pub Dependencies
        run: flutter pub get

      - name: Build Android (Unsigned)
        if: matrix.target == 'android'
        run: |
          flutter build apk --release --no-tree-shake-icons
          flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: Build iOS (Unsigned)
        if: matrix.target == 'ios'
        run: flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Build Linux
        if: matrix.target == 'linux'
        run: flutter build linux --release

      - name: Build macOS
        if: matrix.target == 'macos'
        run: flutter build macos --release

      - name: Build Windows & MSIX
        if: matrix.target == 'windows'
        run: |
          flutter build windows --release
          dart run msix:create

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/ios/iphoneos/*.app
            build/linux/x64/release/bundle/*
            build/macos/Build/Products/Release/*.app
            build/windows/runner/Release/*.msix

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get Version
        id: pkg
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //' | cut -d '+' -f 1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare and Rename Assets
        run: |
          mkdir -p dist
          
          # Android Renaming
          [ -f artifacts/build-android/app-release.apk ] && cp artifacts/build-android/app-release.apk dist/recombox-android-universal.apk
          [ -f artifacts/build-android/app-armeabi-v7a-release.apk ] && cp artifacts/build-android/app-armeabi-v7a-release.apk dist/recombox-android-armv7.apk
          [ -f artifacts/build-android/app-arm64-v8a-release.apk ] && cp artifacts/build-android/app-arm64-v8a-release.apk dist/recombox-android-arm64.apk
          [ -f artifacts/build-android/app-x86_64-release.apk ] && cp artifacts/build-android/app-x86_64-release.apk dist/recombox-android-x64.apk
          
          # Windows Renaming
          find artifacts/build-windows -name "*.msix" -exec cp {} dist/recombox-windows-x64.msix \;
          
          # Linux & macOS (Zipped)
          tar -czf dist/recombox-linux-x64.tar.gz -C artifacts/build-linux .
          tar -czf dist/recombox-macos-universal.tar.gz -C artifacts/build-macos .
          
          # iOS (App folder zipped as it is unsigned)
          tar -czf dist/recombox-ios-unsigned.tar.gz -C artifacts/build-ios .

      - name: Create latest.json
        shell: bash
        run: |
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/v${{ steps.pkg.outputs.version }}"
          
          jq -n \
            --arg version "${{ steps.pkg.outputs.version }}" \
            --arg win "$BASE_URL/recombox-windows-x64.msix" \
            --arg apk "$BASE_URL/recombox-android-universal.apk" \
            --arg arm "$BASE_URL/recombox-android-armv7.apk" \
            --arg arm64 "$BASE_URL/recombox-android-arm64.apk" \
            --arg x64 "$BASE_URL/recombox-android-x64.apk" \
            '{
              version: $version,
              release: {
                windows: { x64: $win },
                android: { 
                  universal: $apk,
                  arm32: $arm,
                  arm64: $arm64,
                  x64: $x64
                }
              }
            }' > latest.json
          
          cp latest.json dist/

      - name: Upload to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          file_glob: true
          tag: v${{ steps.pkg.outputs.version }}
          overwrite: true
          release_name: "Release v${{ steps.pkg.outputs.version }}"
          draft: true