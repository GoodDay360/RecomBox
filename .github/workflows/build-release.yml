name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest
          - target: ios
            os: macos-latest
          - target: linux
            os: ubuntu-latest
          - target: macos
            os: macos-latest
          - target: windows
            os: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # --- Rust Caching (rust/target) ---
      - name: Cache rustup toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
            ~/.cargo/bin
          key: rustup-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rustup-${{ runner.os }}-

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"
          cache-targets: true
          cache-on-failure: true

      - name: Install Linux Dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++6 libmpv-dev mpv

      - name: Install Flutter Pub Dependencies
        run: flutter pub get

      - name: Build Android
        if: matrix.target == 'android'
        run: |
          flutter build apk --release --no-tree-shake-icons
          flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: Build iOS (Unsigned)
        if: matrix.target == 'ios'
        run: flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Build Linux
        if: matrix.target == 'linux'
        run: flutter build linux --release

      - name: Build macOS
        if: matrix.target == 'macos'
        run: flutter build macos --release

      - name: Build Windows & MSIX
        if: matrix.target == 'windows'
        run: |
          flutter build windows --release
          dart run msix:create

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/ios/iphoneos/*.app
            build/linux/x64/release/bundle/*
            build/macos/Build/Products/Release/*.app
            build/windows/runner/Release/*.msix

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get App Metadata
        id: meta
        run: |
          APP_NAME=$(grep '^name: ' pubspec.yaml | sed 's/name: //' | xargs)
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | cut -d '+' -f 1 | xargs)
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare and Rename Assets
        run: |
          mkdir -p dist
          NAME="${{ steps.meta.outputs.app_name }}"
          
          # Android
          [ -f artifacts/build-android/app-release.apk ] && cp artifacts/build-android/app-release.apk dist/$NAME-android-universal.apk
          [ -f artifacts/build-android/app-armeabi-v7a-release.apk ] && cp artifacts/build-android/app-armeabi-v7a-release.apk dist/$NAME-android-arm.apk
          [ -f artifacts/build-android/app-arm64-v8a-release.apk ] && cp artifacts/build-android/app-arm64-v8a-release.apk dist/$NAME-android-aarch64.apk
          [ -f artifacts/build-android/app-x86_64-release.apk ] && cp artifacts/build-android/app-x86_64-release.apk dist/$NAME-android-x86_64.apk
          
          # Windows
          find artifacts/build-windows -name "*.msix" -exec cp {} dist/$NAME-windows-x86_64.msix \;
          
          # Desktop & Mobile Bundles
          tar -czf dist/$NAME-linux-x86_64.tar.gz -C artifacts/build-linux .
          tar -czf dist/$NAME-macos-aarch64.tar.gz -C artifacts/build-macos .
          tar -czf dist/$NAME-ios-aarch64.tar.gz -C artifacts/build-ios .

      - name: Create latest.json
        shell: bash
        run: |
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/v${{ steps.meta.outputs.version }}"
          NAME="${{ steps.meta.outputs.app_name }}"
          
          jq -n \
            --arg version "${{ steps.meta.outputs.version }}" \
            --arg name "$NAME" \
            --arg win_x64 "$BASE_URL/$NAME-windows-x86_64.msix" \
            --arg lin_x64 "$BASE_URL/$NAME-linux-x86_64.tar.gz" \
            --arg mac_arm "$BASE_URL/$NAME-macos-aarch64.tar.gz" \
            --arg ios_arm "$BASE_URL/$NAME-ios-aarch64.tar.gz" \
            --arg and_univ "$BASE_URL/$NAME-android-universal.apk" \
            --arg and_arm "$BASE_URL/$NAME-android-arm.apk" \
            --arg and_arm64 "$BASE_URL/$NAME-android-aarch64.apk" \
            --arg and_x64 "$BASE_URL/$NAME-android-x86_64.apk" \
            '{
              version: $version,
              name: $name,
              release: {
                windows: { x86_64: $win_x64 },
                linux: { x86_64: $lin_x64 },
                macos: { aarch64: $mac_arm },
                ios: { aarch64: $ios_arm },
                android: { 
                  universal: $and_univ,
                  arm: $and_arm,
                  aarch64: $and_arm64,
                  x86_64: $and_x64
                }
              }
            }' > latest.json
          
          cp latest.json dist/

      - name: Upload to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          file_glob: true
          tag: v${{ steps.meta.outputs.version }}
          overwrite: true
          release_name: "${{ steps.meta.outputs.app_name }} v${{ steps.meta.outputs.version }}"
          draft: true